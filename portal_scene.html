<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 22%, rgba(86, 135, 190, 0.14), transparent 36%),
          radial-gradient(circle at 50% 70%, rgba(255, 168, 76, 0.07), transparent 28%),
          #02070d;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: manipulation;
      }
    </style>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.18/dist/hls.min.js"></script>
  </head>
  <body>
    <script>
      (() => {
        const bridge = (payload) => {
          if (window.HollowCastBridge) {
            window.HollowCastBridge.postMessage(JSON.stringify(payload));
          }
        };

        const renderer = new THREE.WebGLRenderer({
          antialias: true,
          alpha: true,
          powerPreference: "high-performance",
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x02070d, 0.12);

        const camera = new THREE.PerspectiveCamera(
          48,
          window.innerWidth / window.innerHeight,
          0.1,
          100
        );
        camera.position.set(0, 0, 0.85);

        const room = new THREE.Mesh(
          new THREE.SphereGeometry(14, 40, 40),
          new THREE.MeshBasicMaterial({
            color: 0x02070d,
            side: THREE.BackSide,
          })
        );
        scene.add(room);

        const ambient = new THREE.AmbientLight(0x7eaed6, 0.4);
        scene.add(ambient);

        const keyLight = new THREE.PointLight(0x98cfff, 1.2, 18, 2);
        keyLight.position.set(0, 0.7, 1.2);
        scene.add(keyLight);

        const fillLight = new THREE.PointLight(0xffb377, 0.45, 16, 2);
        fillLight.position.set(0.9, -0.2, 0.6);
        scene.add(fillLight);

        const anchorRig = new THREE.Group();
        scene.add(anchorRig);

        const portalGroup = new THREE.Group();
        portalGroup.position.set(0, 0.04, -3.3);
        anchorRig.add(portalGroup);

        const presenceGroup = new THREE.Group();
        presenceGroup.position.set(0, -0.06, 1.75);
        anchorRig.add(presenceGroup);

        const portalGeometry = new THREE.PlaneGeometry(2.86, 1.66, 72, 40);
        const portalPositions = portalGeometry.attributes.position;
        for (let index = 0; index < portalPositions.count; index += 1) {
          const x = portalPositions.getX(index);
          const y = portalPositions.getY(index);
          const curve = Math.sin((x / 2.86) * Math.PI) * 0.15;
          const lift = Math.cos((y / 1.66) * Math.PI) * 0.02;
          portalPositions.setZ(index, curve + lift);
        }
        portalGeometry.computeVertexNormals();

        const auraGeometry = new THREE.PlaneGeometry(4.4, 2.8, 1, 1);
        const spillGeometry = new THREE.PlaneGeometry(3.6, 2.5, 1, 1);
        const shadowGeometry = new THREE.PlaneGeometry(3.4, 1.15, 1, 1);

        const video = document.createElement("video");
        video.crossOrigin = "anonymous";
        video.playsInline = true;
        video.loop = true;
        video.autoplay = true;
        video.preload = "auto";

        const videoTexture = new THREE.VideoTexture(video);
        videoTexture.colorSpace = THREE.SRGBColorSpace;
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;

        const sampleCanvas = document.createElement("canvas");
        sampleCanvas.width = 48;
        sampleCanvas.height = 27;
        const sampleContext = sampleCanvas.getContext("2d", {
          willReadFrequently: true,
        });

        const sharedUniforms = {
          map: { value: videoTexture },
          brightness: { value: 0.42 },
          immersion: { value: 0.82 },
          reveal: { value: 0.0 },
          time: { value: 0.0 },
          motionX: { value: 0.0 },
          motionY: { value: 0.0 },
          motionEnergy: { value: 0.0 },
        };

        function createPortalMaterial(options) {
          return new THREE.ShaderMaterial({
            transparent: true,
            depthWrite: false,
            side: THREE.DoubleSide,
            uniforms: {
              map: sharedUniforms.map,
              brightness: sharedUniforms.brightness,
              immersion: sharedUniforms.immersion,
              reveal: sharedUniforms.reveal,
              time: sharedUniforms.time,
              motionX: sharedUniforms.motionX,
              motionY: sharedUniforms.motionY,
              motionEnergy: sharedUniforms.motionEnergy,
              bandStart: { value: options.bandStart },
              bandEnd: { value: options.bandEnd },
              layerAlpha: { value: options.layerAlpha },
              edgeSoftness: { value: options.edgeSoftness },
              distortion: { value: options.distortion },
              noiseAmount: { value: options.noiseAmount },
              tint: { value: new THREE.Color(options.tint) },
            },
            vertexShader: `
              varying vec2 vUv;
              varying vec3 vNormal;
              void main() {
                vUv = uv;
                vNormal = normal;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
              }
            `,
            fragmentShader: `
              uniform sampler2D map;
              uniform float brightness;
              uniform float immersion;
              uniform float reveal;
              uniform float time;
              uniform float motionX;
              uniform float motionY;
              uniform float motionEnergy;
              uniform float bandStart;
              uniform float bandEnd;
              uniform float layerAlpha;
              uniform float edgeSoftness;
              uniform float distortion;
              uniform float noiseAmount;
              uniform vec3 tint;
              varying vec2 vUv;
              varying vec3 vNormal;

              float rand(vec2 co) {
                return fract(sin(dot(co.xy, vec2(12.9898, 78.233))) * 43758.5453123);
              }

              vec4 blurredSample(vec2 uv) {
                vec2 offset = vec2(0.004, 0.0026);
                vec4 color = texture2D(map, uv) * 0.34;
                color += texture2D(map, uv + vec2(offset.x, 0.0)) * 0.18;
                color += texture2D(map, uv - vec2(offset.x, 0.0)) * 0.18;
                color += texture2D(map, uv + vec2(0.0, offset.y)) * 0.15;
                color += texture2D(map, uv - vec2(0.0, offset.y)) * 0.15;
                return color;
              }

              void main() {
                vec2 centered = vUv - 0.5;
                float radial = length(vec2(centered.x * 1.08, centered.y * 1.28));
                float border = smoothstep(0.2, 0.5, radial);
                float distortionWave =
                  sin((vUv.y * 18.0) + time * 0.7 + motionEnergy * 10.0) * 0.0032 +
                  cos((vUv.x * 11.0) - time * 0.4) * 0.0024;
                vec2 distortionVector = normalize(centered + 0.0001) * border * distortionWave * distortion;
                vec2 distortedUv = clamp(
                  vUv + distortionVector + vec2(motionX * 0.006, motionY * 0.004) * border,
                  0.0,
                  1.0
                );
                vec4 source = blurredSample(distortedUv);
                float luma = dot(source.rgb, vec3(0.299, 0.587, 0.114));
                float layerMask = smoothstep(bandStart, bandStart + 0.14, luma)
                  * (1.0 - smoothstep(bandEnd - 0.14, bandEnd, luma));
                float feather = exp(-pow(max(radial - edgeSoftness, 0.0) * 5.4, 2.0));
                float adaptiveVignette = 1.0 - smoothstep(0.28 + brightness * 0.18, 0.74, radial);
                float alphaGradient = clamp(feather * adaptiveVignette, 0.0, 1.0);
                float revealMask = smoothstep(1.04, 0.06, radial + (1.0 - reveal) * 0.92);
                float normalGlow = pow(max(dot(normalize(vNormal), vec3(0.0, 0.0, 1.0)), 0.0), 2.2);
                float grain = (rand(vUv * (time * 0.1 + 20.0)) - 0.5) * noiseAmount;
                vec3 graded = source.rgb * (0.95 + immersion * 0.08);
                graded = mix(graded, graded + tint * 0.06, normalGlow * 0.3);
                graded += grain;
                float alpha = alphaGradient * revealMask * max(layerMask, 0.18) * layerAlpha;
                if (alpha < 0.01) {
                  discard;
                }
                gl_FragColor = vec4(graded, alpha);
              }
            `,
          });
        }

        const backgroundLayer = new THREE.Mesh(
          portalGeometry,
          createPortalMaterial({
            bandStart: 0.0,
            bandEnd: 0.58,
            layerAlpha: 0.52,
            edgeSoftness: 0.37,
            distortion: 0.55,
            noiseAmount: 0.018,
            tint: 0x74a9de,
          })
        );
        backgroundLayer.position.z = -0.06;
        portalGroup.add(backgroundLayer);

        const midLayer = new THREE.Mesh(
          portalGeometry,
          createPortalMaterial({
            bandStart: 0.2,
            bandEnd: 0.86,
            layerAlpha: 0.94,
            edgeSoftness: 0.34,
            distortion: 0.72,
            noiseAmount: 0.022,
            tint: 0x9bc4e7,
          })
        );
        portalGroup.add(midLayer);

        const foregroundLayer = new THREE.Mesh(
          portalGeometry,
          createPortalMaterial({
            bandStart: 0.46,
            bandEnd: 1.02,
            layerAlpha: 0.48,
            edgeSoftness: 0.31,
            distortion: 0.9,
            noiseAmount: 0.026,
            tint: 0xffc188,
          })
        );
        foregroundLayer.position.z = 0.06;
        portalGroup.add(foregroundLayer);

        const peripheralMaterial = new THREE.ShaderMaterial({
          transparent: true,
          depthWrite: false,
          side: THREE.DoubleSide,
          blending: THREE.AdditiveBlending,
          uniforms: {
            map: sharedUniforms.map,
            reveal: sharedUniforms.reveal,
            time: sharedUniforms.time,
            motionX: sharedUniforms.motionX,
            motionY: sharedUniforms.motionY,
            motionEnergy: sharedUniforms.motionEnergy,
            brightness: sharedUniforms.brightness,
          },
          vertexShader: `
            varying vec2 vUv;
            void main() {
              vUv = uv;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform sampler2D map;
            uniform float reveal;
            uniform float time;
            uniform float motionX;
            uniform float motionY;
            uniform float motionEnergy;
            uniform float brightness;
            varying vec2 vUv;

            vec4 blur(vec2 uv) {
              vec2 spread = vec2(0.014 + motionEnergy * 0.03, 0.009 + motionEnergy * 0.02);
              vec4 color = texture2D(map, uv) * 0.2;
              color += texture2D(map, uv + vec2(spread.x, 0.0)) * 0.14;
              color += texture2D(map, uv - vec2(spread.x, 0.0)) * 0.14;
              color += texture2D(map, uv + vec2(0.0, spread.y)) * 0.12;
              color += texture2D(map, uv - vec2(0.0, spread.y)) * 0.12;
              color += texture2D(map, uv + spread * 0.6) * 0.14;
              color += texture2D(map, uv - spread * 0.6) * 0.14;
              return color;
            }

            void main() {
              vec2 centered = vUv - 0.5;
              float radial = length(vec2(centered.x * 1.05, centered.y * 1.16));
              float ring = smoothstep(0.33, 0.9, radial) * (1.0 - smoothstep(0.88, 1.2, radial));
              vec2 sampleUv = clamp(
                vec2(0.5) + centered * 0.56 + vec2(motionX * 0.015, motionY * 0.012),
                0.0,
                1.0
              );
              vec4 source = blur(sampleUv);
              float alpha = ring * (0.08 + motionEnergy * 0.28 + brightness * 0.08) * reveal;
              gl_FragColor = vec4(source.rgb, alpha);
            }
          `,
        });

        const auraMesh = new THREE.Mesh(auraGeometry, peripheralMaterial);
        auraMesh.position.set(0, 0.02, -0.22);
        portalGroup.add(auraMesh);

        function createSpillMesh(position, scale) {
          const material = new THREE.MeshBasicMaterial({
            color: 0x75baf0,
            transparent: true,
            opacity: 0.0,
            blending: THREE.AdditiveBlending,
          });
          const mesh = new THREE.Mesh(spillGeometry, material);
          mesh.position.copy(position);
          mesh.scale.copy(scale);
          mesh.renderOrder = -1;
          portalGroup.add(mesh);
          return mesh;
        }

        const leftSpill = createSpillMesh(new THREE.Vector3(-1.3, 0.02, -0.24), new THREE.Vector3(0.5, 1.0, 1));
        const rightSpill = createSpillMesh(new THREE.Vector3(1.3, 0.02, -0.24), new THREE.Vector3(0.5, 1.0, 1));
        const topSpill = createSpillMesh(new THREE.Vector3(0, 0.86, -0.24), new THREE.Vector3(1.0, 0.38, 1));
        const floorSpill = createSpillMesh(new THREE.Vector3(0, -0.88, -0.24), new THREE.Vector3(1.15, 0.44, 1));

        function createExpansionCanvas(width, height) {
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          const context = canvas.getContext("2d", { willReadFrequently: true });
          return { canvas, context, texture: new THREE.CanvasTexture(canvas) };
        }

        const leftExpansion = createExpansionCanvas(128, 256);
        const rightExpansion = createExpansionCanvas(128, 256);
        const topExpansion = createExpansionCanvas(256, 96);
        const floorExpansion = createExpansionCanvas(256, 96);

        function createExpansionMesh(source, width, height, position, rotation = new THREE.Euler()) {
          const material = new THREE.MeshBasicMaterial({
            map: source.texture,
            transparent: true,
            opacity: 0.62,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            side: THREE.DoubleSide,
          });
          const mesh = new THREE.Mesh(
            new THREE.PlaneGeometry(width, height),
            material,
          );
          mesh.position.copy(position);
          mesh.rotation.copy(rotation);
          portalGroup.add(mesh);
          return mesh;
        }

        const leftExpansionMesh = createExpansionMesh(
          leftExpansion,
          1.16,
          1.92,
          new THREE.Vector3(-1.88, 0.02, -0.2),
        );
        const rightExpansionMesh = createExpansionMesh(
          rightExpansion,
          1.16,
          1.92,
          new THREE.Vector3(1.88, 0.02, -0.2),
        );
        const topExpansionMesh = createExpansionMesh(
          topExpansion,
          3.2,
          0.82,
          new THREE.Vector3(0, 1.18, -0.24),
        );
        const floorExpansionMesh = createExpansionMesh(
          floorExpansion,
          3.2,
          0.86,
          new THREE.Vector3(0, -1.26, -0.28),
          new THREE.Euler(-0.08, 0, 0),
        );

        const interactionZoneGroup = new THREE.Group();
        portalGroup.add(interactionZoneGroup);

        function createInteractionZone(config) {
          const mesh = new THREE.Mesh(
            new THREE.PlaneGeometry(config.width, config.height),
            new THREE.MeshBasicMaterial({
              color: 0xffffff,
              transparent: true,
              opacity: 0.0,
              depthWrite: false,
              side: THREE.DoubleSide,
            })
          );
          mesh.position.set(config.x, config.y, config.z);
          mesh.userData = {
            id: config.id,
            depth: config.depth,
            response: config.response,
            side: config.side,
          };
          interactionZoneGroup.add(mesh);
          return mesh;
        }

        const interactionZones = [
          createInteractionZone({
            id: "foreground-living",
            depth: "foreground",
            response: "living",
            side: "center",
            width: 1.6,
            height: 0.92,
            x: 0,
            y: 0.15,
            z: 0.14,
          }),
          createInteractionZone({
            id: "mid-hard-left",
            depth: "mid",
            response: "hard",
            side: "left",
            width: 1.08,
            height: 1.26,
            x: -0.72,
            y: 0.0,
            z: 0.02,
          }),
          createInteractionZone({
            id: "mid-hard-right",
            depth: "mid",
            response: "hard",
            side: "right",
            width: 1.08,
            height: 1.26,
            x: 0.72,
            y: 0.0,
            z: 0.02,
          }),
          createInteractionZone({
            id: "background-soft",
            depth: "background",
            response: "soft",
            side: "center",
            width: 2.46,
            height: 1.48,
            x: 0,
            y: -0.02,
            z: -0.1,
          }),
        ];

        const reactionGroup = new THREE.Group();
        portalGroup.add(reactionGroup);

        const shadowMesh = new THREE.Mesh(
          shadowGeometry,
          new THREE.MeshBasicMaterial({
            color: 0x000000,
            transparent: true,
            opacity: 0.18,
          })
        );
        shadowMesh.rotation.x = -1.08;
        shadowMesh.position.set(0, -1.1, 0.2);
        portalGroup.add(shadowMesh);

        const motionShadowLeft = new THREE.Mesh(
          new THREE.PlaneGeometry(1.2, 1.8),
          new THREE.MeshBasicMaterial({
            color: 0x02070d,
            transparent: true,
            opacity: 0.0,
          })
        );
        motionShadowLeft.position.set(-1.78, 0.0, -0.65);
        portalGroup.add(motionShadowLeft);

        const motionShadowRight = motionShadowLeft.clone();
        motionShadowRight.position.x = 1.78;
        portalGroup.add(motionShadowRight);

        let audioContext = null;
        let mediaSource = null;
        let panner = null;
        let dryGain = null;
        let wetGain = null;
        let convolver = null;
        let presenceReverbGain = null;
        let presenceConvolver = null;
        let hls = null;

        let settings = {
          spatialAudioEnabled: true,
          immersionLevel: 0.82,
          headTrackingEnabled: true,
          deviceMode: "phone",
          anchorPersistenceEnabled: true,
        };
        let sceneConfig = null;
        let environmentBrightness = 0.28;
        let motionTarget = { x: 0, y: 0, magnitude: 0, userActive: 0 };
        let smoothedMotion = { x: 0, y: 0 };
        let cameraOffset = { x: 0, y: 0 };
        let driftOffset = { x: 0, y: 0 };
        let worldMotion = { x: 0, y: 0, z: 0 };
        let deviceVelocity = { x: 0, y: 0 };
        let anchorBroadcastAt = 0;
        let anchorBridgeAt = 0;
        let anchorDirty = false;
        let materializeStart = performance.now();
        let materializeRequested = true;
        let frameState = {
          color: new THREE.Color(0.36, 0.54, 0.8),
          brightness: 0.42,
          flash: 0.0,
          centroidX: 0.0,
          centroidY: 0.0,
          motionEstimate: 0.0,
          depthForeground: 0.62,
          depthBackground: 0.28,
        };
        let previousBrightness = 0.42;
        let expansionTick = 0;
        let sceneAi = {
          profile: "cinematic-procedural",
          seedHint: 4172,
          weatherBias: 0.34,
          motionBias: 0.42,
          extensionIntensity: 0.72,
        };
        let roomAiState = {
          seed: 4172,
          weatherMode: "mist",
          horizonShift: 0,
          ambientMotion: 0.42,
          continuityDrift: 0.14,
          extensionSeed: 4172,
          memoryPulse: 0,
        };
        let continuityCache = {
          left: null,
          right: null,
          top: null,
          floor: null,
        };

        let presenceSession = null;
        let roomState = null;
        let localPeerId = null;
        let localStream = null;
        let localMicAnalyser = null;
        let localMicData = null;
        let signalingSocket = null;
        let reconnectTimer = null;
        let reconnectAttempt = 0;
        const peerConnections = new Map();
        const peerDataChannels = new Map();
        const remoteAudioNodes = new Map();
        const remoteAvatars = new Map();
        let lastPresenceSend = 0;
        let lastPlaybackSend = 0;
        let lastAiStateSend = 0;
        const raycaster = new THREE.Raycaster();
        const pointerNdc = new THREE.Vector2(0, 0);
        const interactionEffects = [];
        const interactionField = {
          energy: 0,
          hold: 0,
          left: 0,

        };
        const interactionState = {
          down: false,
