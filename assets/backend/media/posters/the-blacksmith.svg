<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500" role="img" aria-labelledby="title desc">
  <title id="title">The Blacksmith poster</title>
  <desc id="desc">Stylized poster art for the 1922 Buster Keaton short The Blacksmith.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="100%" stop-color="#4b1f0c"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="1500" fill="url(#bg)"/>
  <rect x="44" y="44" width="912" height="1412" rx="28" fill="none" stroke="#f0b35a" stroke-width="8"/>
  <text x="500" y="170" fill="#f0b35a" font-size="44" text-anchor="middle" font-family="Georgia, serif" letter-spacing="8">BUSTER KEATON</text>
  <text x="500" y="290" fill="#fff0d3" font-size="118" text-anchor="middle" font-family="Georgia, serif" font-weight="700">THE</text>
  <text x="500" y="420" fill="#fff0d3" font-size="146" text-anchor="middle" font-family="Georgia, serif" font-weight="700">BLACKSMITH</text>
  <g transform="translate(500 825)">
    <circle r="206" fill="#201913"/>
    <rect x="-24" y="-218" width="48" height="436" rx="20" fill="#f0b35a"/>
    <rect x="-170" y="-48" width="340" height="96" rx="32" fill="#f0b35a"/>
    <path d="M-102 132h204c-16 78-64 118-102 118s-86-40-102-118z" fill="#fff0d3"/>
    <circle cx="-42" cy="-8" r="10" fill="#201913"/>
    <circle cx="42" cy="-8" r="10" fill="#201913"/>
  </g>
  <g fill="#ffcf7a">
    <circle cx="258" cy="660" r="8"/>
    <circle cx="210" cy="728" r="10"/>
    <circle cx="760" cy="694" r="9"/>
    <circle cx="798" cy="754" r="7"/>
    <circle cx="284" cy="886" r="8"/>
    <circle cx="742" cy="878" r="8"/>
  </g>
  <text x="500" y="1210" fill="#f0b35a" font-size="48" text-anchor="middle" font-family="Arial, sans-serif" letter-spacing="5">ANVILS, CHAOS, AND DEADPAN GENIUS</text>
  <text x="500" y="1302" fill="#fff0d3" font-size="58" text-anchor="middle" font-family="Georgia, serif">Public Domain Silent Short</text>
  <text x="500" y="1390" fill="#f0b35a" font-size="72" text-anchor="middle" font-family="Georgia, serif" letter-spacing="10">1922</text>
</svg>
