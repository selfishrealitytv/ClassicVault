    <ellipse cx="-18" cy="-20" rx="96" ry="125" fill="#111"/>
    <circle cx="-52" cy="-42" r="9" fill="#f4e6cd"/>
    <circle cx="10" cy="-38" r="9" fill="#f4e6cd"/>
    <path d="M-114 -126c-48-68-24-122 18-144 6 61 22 102 56 144" fill="none" stroke="#111" stroke-width="18" stroke-linecap="round"/>
    <path d="M78 -124c48-68 24-122-18-144-6 61-22 102-56 144" fill="none" stroke="#111" stroke-width="18" stroke-linecap="round"/>
    <path d="M-118 78c38 36 76 54 118 54s80-18 118-54" fill="none" stroke="#111" stroke-width="20" stroke-linecap="round"/>
    <rect x="-150" y="152" width="300" height="36" rx="18" fill="#111"/>
  </g>
  <text x="500" y="1180" fill="#d9c2a0" font-size="48" text-anchor="middle" font-family="Arial, sans-serif" letter-spacing="4">THE GREAT STONE FACE ON THE RUN</text>
  <text x="500" y="1270" fill="#f8edd8" font-size="58" text-anchor="middle" font-family="Georgia, serif">Public Domain Silent Short</text>
