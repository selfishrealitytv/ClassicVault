<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500" role="img" aria-labelledby="title desc">
  <title id="title">The Goat poster</title>
  <desc id="desc">Stylized poster art for the 1921 Buster Keaton short The Goat.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16120f"/>
      <stop offset="100%" stop-color="#3d2a1c"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="1500" fill="url(#bg)"/>
  <rect x="48" y="48" width="904" height="1404" rx="28" fill="none" stroke="#d4b06a" stroke-width="8"/>
  <text x="500" y="170" fill="#d4b06a" font-size="44" text-anchor="middle" font-family="Georgia, serif" letter-spacing="8">BUSTER KEATON</text>
  <text x="500" y="290" fill="#f8edd8" font-size="150" text-anchor="middle" font-family="Georgia, serif" font-weight="700">THE</text>
  <text x="500" y="430" fill="#f8edd8" font-size="176" text-anchor="middle" font-family="Georgia, serif" font-weight="700">GOAT</text>
  <g transform="translate(500 830)">
