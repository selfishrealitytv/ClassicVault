<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="ClassicVault streams curated classic horror, noir, comedy, Black cinema, and public-domain film with a fast poster-first library experience.">
  <meta name="theme-color" content="#0B0B0B">
  <meta name="color-scheme" content="dark">
  <meta name="robots" content="index,follow">
  <meta name="application-name" content="ClassicVault">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="ClassicVault">
  <meta property="og:title" content="ClassicVault">
  <meta property="og:description" content="A premium-feeling library of classic horror, noir, comedy, Black cinema, and public-domain film.">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta property="og:image:alt" content="ClassicVault app icon">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ClassicVault">
  <meta name="twitter:description" content="Classic horror, noir, comedy, Black cinema, and public-domain film in one fast, curated vault.">
  <meta name="twitter:image" content="icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ClassicVault">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ClassicVault</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      color-scheme: dark;
      --cv-bg: #07090d;
      --cv-bg-elevated: rgba(10, 16, 24, 0.92);
      --cv-gold: #d4af37;
      --cv-gold-soft: #efd891;
      --cv-text: #eff6fb;
      --cv-text-muted: #9fb3c4;
      --cv-border: rgba(212, 175, 55, 0.22);
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(193, 142, 37, 0.1), transparent 28%),
        linear-gradient(180deg, #050608 0%, var(--cv-bg) 100%);
      color: var(--cv-text);
      font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
    }

    #boot-status {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at center, rgba(197, 152, 56, 0.16), transparent 40%),
        radial-gradient(circle at top, rgba(84, 120, 168, 0.16), transparent 35%),
        linear-gradient(180deg, #030406 0%, #091119 100%);
      z-index: 999999;
    }

    #boot-card {
      max-width: 620px;
      width: 100%;
      padding: 28px 28px 24px;
      border-radius: 26px;
      border: 1px solid var(--cv-border);
      background: linear-gradient(180deg, rgba(14, 18, 24, 0.96), var(--cv-bg-elevated));
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(14px);
    }

    #boot-kicker {
      margin: 0 0 10px;
      color: var(--cv-gold-soft);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    #boot-title {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 0.95;
      color: #fff8e7;
    }

    #boot-subtitle {
      margin: 0 0 18px;
      font-size: 14px;
      line-height: 1.55;
      color: var(--cv-text-muted);
      max-width: 48ch;
    }

    #boot-progress {
      position: relative;
      width: 100%;
      height: 4px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      margin-bottom: 16px;
    }

    #boot-progress::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 38%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(212, 175, 55, 0.08), rgba(212, 175, 55, 0.95), rgba(255, 239, 199, 0.9));
      box-shadow: 0 0 24px rgba(212, 175, 55, 0.42);
      animation: cv-progress 1.8s ease-in-out infinite;
    }

    #boot-message {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      color: var(--cv-text-muted);
      white-space: pre-wrap;
      word-break: break-word;
    }

    #boot-actions {
      display: none;
      margin-top: 18px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .boot-button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease, background 120ms ease;
    }

    .boot-button:hover {
      transform: translateY(-1px);
    }

    .boot-button-primary {
      background: linear-gradient(135deg, #c89e37, #f0d787);
      color: #18120a;
    }

    .boot-button-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--cv-text);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    noscript {
      display: block;
      padding: 12px 24px;
      background: #180d0d;
      color: #ffd7d7;
      text-align: center;
      font: 600 14px/1.4 "Avenir Next", Avenir, "Segoe UI", sans-serif;
    }

    @keyframes cv-progress {
      0% { transform: translateX(-110%); }
      100% { transform: translateX(320%); }
    }
  </style>
</head>
<body>
  <noscript>ClassicVault needs JavaScript enabled to load the catalog.</noscript>
  <div id="boot-status">
    <div id="boot-card">
      <p id="boot-kicker">Classic Cinema Vault</p>
      <h1 id="boot-title">ClassicVault</h1>
      <p id="boot-subtitle">A curated library of classic horror, noir, Black cinema, comedy, and public-domain film.</p>
      <div id="boot-progress"></div>
      <p id="boot-message">Loading web app...</p>
      <div id="boot-actions">
        <button id="boot-retry" class="boot-button boot-button-primary" type="button">Reload</button>
        <button id="boot-dismiss" class="boot-button boot-button-secondary" type="button">Hide Status</button>
      </div>
    </div>
  </div>
  <script>
    (function () {
      const message = document.getElementById('boot-message');
      const status = document.getElementById('boot-status');
      const actions = document.getElementById('boot-actions');
      const retry = document.getElementById('boot-retry');
      const dismiss = document.getElementById('boot-dismiss');

      function revealActions() {
        if (actions) {
          actions.style.display = 'flex';
        }
      }

      function setMessage(text) {
        if (message) {
          message.textContent = text;
        }
      }

      function showFriendlyError(prefix, detail) {
        console.error(prefix, detail);
        setMessage(prefix + '\nRefresh the page to try again.');
        revealActions();
      }

      window.addEventListener('error', function (event) {
        const detail = event && event.error ? (event.error.stack || String(event.error)) : String(event.message || event);
        showFriendlyError('ClassicVault hit a startup error.', detail);
      });

      window.addEventListener('unhandledrejection', function (event) {
        const reason = event && event.reason ? (event.reason.stack || String(event.reason)) : 'Unknown promise rejection';
        showFriendlyError('ClassicVault could not finish loading.', reason);
      });

      if (retry) {
        retry.addEventListener('click', function () {
          window.location.reload();
        });
      }

      if (dismiss) {
        dismiss.addEventListener('click', function () {
          if (status) {
            status.style.display = 'none';
          }
        });
      }

      let checks = 0;
      const timer = window.setInterval(function () {
        checks += 1;
        const flutterView = document.querySelector('flt-glass-pane, flutter-view');
        if (flutterView) {
          if (status) {
            status.style.display = 'none';
          }
          window.clearInterval(timer);
          return;
        }
        if (checks === 5) {
          setMessage('Still loading the ClassicVault runtime...');
        }
        if (checks === 20) {
          setMessage('This is taking longer than expected.\nClassicVault is still waiting for the first rendered frame.');
        }
        if (checks === 40) {
          revealActions();
        }
      }, 500);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
